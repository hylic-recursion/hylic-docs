name: pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Builds the mdBook and deploys to GitHub Pages. The workflow co-checks
# out the sibling repos (hylic, hylic-pipeline) so the book's
# `{{#include ../../../hylic*/...}}` snippets resolve.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hylic-docs
        uses: actions/checkout@v4
        with:
          path: hylic-docs
      - name: Checkout hylic
        uses: actions/checkout@v4
        with:
          repository: hylic-recursion/hylic
          path: hylic
      - name: Checkout hylic-pipeline
        uses: actions/checkout@v4
        with:
          repository: hylic-recursion/hylic-pipeline
          path: hylic-pipeline
      - uses: dtolnay/rust-toolchain@stable
      - name: install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: install mdbook + mdbook-graphviz
        run: |
          cargo install --locked mdbook
          cargo install --locked mdbook-graphviz
      - name: build book
        working-directory: hylic-docs/book
        run: mdbook build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: hylic-docs/target/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
